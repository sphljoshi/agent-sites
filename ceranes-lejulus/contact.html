<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get a Free Insurance Quote | Ceranes Lejulus, Orlando, FL</title>
    <meta
      name="description"
      content="Contact Ceranes Lejulus of Everbe Insurance for a free personal, commercial or life insurance quote with no obligation. Call (855) 717-0011, serving 24 states from Orlando, FL."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "InsuranceAgency",
      "name": "Everbe Insurance",
      "telephone": "+18557170011",
      "email": "ceranesmedia@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "100 E Pine St, Suite 110",
        "addressLocality": "Orlando",
        "addressRegion": "FL",
        "postalCode": "32801",
        "addressCountry": "US"
      },
      "areaServed": ["AL","AZ","CA","DC","FL","GA","IL","IN","KY","MA","ME","MI","MO","MS","NJ","NY","OH","OK","SD","TX","VT","WI","WV","WY"],
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
          "opens": "09:00",
          "closes": "18:00"
        }
      ]
    }
    </script>
  </head>
  <body>
    <nav class="nav" id="nav"></nav>

    <div id="smooth-wrapper">
      <div id="smooth-content">

    <!-- HERO -->
    <section class="about-hero about-hero--center about-hero--contact">
      <div class="wrap">
        <h1 class="about-hero__title">Get Your Free<br>Insurance Quote</h1>
        <p class="about-hero__lead">Tell Ceranes what you're protecting and he'll respond promptly with tailored options. No cost, no obligation.</p>
      </div>
    </section>

    <!-- IBLF SERVICE SWITCHER -->
    <section class="section quote-section">
      <div class="wrap">
        <div class="quote-widget-wrap">
          <span class="quote-scribble" aria-hidden="true"><svg viewBox="0 0 100 92" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round"><path d="M20 64C23 50 27 36 33 24"/><path d="M46 62C54 46 63 32 74 20"/><path d="M58 80C68 73 78 66 90 60"/></svg></span>
          <div class="quote-widget quote-widget--center">
            <div class="quote-tabs" id="quote-tabs"></div>
            <div class="quote-panel" id="quote-panel"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="section contact-details">
      <div class="wrap">
        <div class="contact-details__grid">
          <div class="contact-details__intro">
            <h2>Contact Details</h2>
            <p>Reach out any time. Call, email, or stop by the office in Orlando.</p>
          </div>
          <div class="contact-info-row" id="contact-info"></div>
        </div>
        <div class="contact-extra">
          <div class="contact-panel">
            <h3>Agency hours</h3>
            <div id="contact-hours"></div>
          </div>
          <div class="contact-panel">
            <h3>Licensed states</h3>
            <div id="contact-states"></div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer" id="footer"></footer>

      </div><!-- /#smooth-content -->
    </div><!-- /#smooth-wrapper -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollSmoother.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
      buildNav("contact");
      buildFooter();
      initContact();
      initSectionAlternation();
    </script>
  </body>
</html>
