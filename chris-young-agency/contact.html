<!DOCTYPE html>

  <head>

      name="description"

    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "InsuranceAgency",
      "name": "Doran Lee Grohs — Chris Young Agency",
      "telephone": "+16059395229",
      "email": "doran.l.grohs@mwarep.org",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "216 Montalvo Dr.",
        "addressLocality": "Bakersfield",
        "addressRegion": "CA",
        "postalCode": "93309",
        "addressCountry": "US"
      },
      "areaServed": ["CO", "MI", "MT", "ND", "OR", "SD", "TX"],
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "18:00"
        }

  <body>
    <nav class="nav" id="nav"></nav>

    <section class="about-hero about-hero--contact">
      <div class="wrap contact-hero__grid">
        <div class="contact-hero__content">
          <span class="about-hero__label">Contact</span>
          <h1 class="about-hero__title">Get a free quote, built <em>around your needs.</em></h1>
          <p class="about-hero__lead">Tell Doran what you're protecting and he'll respond promptly with tailored options — no cost, no obligation, just clear guidance.</p>

          <div class="quote-tabs" id="quote-tabs"></div>
          <div class="quote-panel" id="quote-panel"></div>
        </div>
      </div>
    </section>

    <section class="section section--soft">
      <div class="wrap">
        <div class="contact-info-row" id="contact-info"></div>
        <div class="contact-extra">
          <div class="contact-panel">
            <h3>Agency hours</h3>
            <div id="contact-hours"></div>
          </div>
          <div class="contact-panel">
            <h3>Licensed states</h3>
            <div id="contact-states"></div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer" id="footer"></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
      buildNav("contact");
      buildFooter();
      initContact();
      initSectionAlternation();
